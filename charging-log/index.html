<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Charging Log</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="../index.html">← Home</a>
      <h1>EV Charging Log</h1>
    </div>
    <nav>
      <a href="../byd-trip-calculator/index.html">Trip Calculator</a>
    </nav>
  </header>

  <main class="layout">
    <section class="card form-card">
      <h2>Log a Charge</h2>
      <form id="charge-form">
        <div class="grid">
          <label>Date
            <input type="date" name="date" required />
          </label>
          <label>Vehicle
            <select name="vehicle" id="vehicle-select" required></select>
          </label>
          <label>ODO (km)
            <input type="number" step="1" name="odo" placeholder="e.g. 5533" />
          </label>
          <label>Location
            <input type="text" name="location" placeholder="Garage, UP Town, ..." />
          </label>

          <label>Start charge %
            <input type="number" step="1" min="0" max="100" name="start_pct" required />
          </label>
          <label>Target %
            <input type="number" step="1" min="0" max="100" name="target_pct" />
          </label>
          <label>Final % (actual)
            <input type="number" step="1" min="0" max="100" name="actual_final_pct" />
          </label>
          <label>Charger (kW)
            <input type="text" name="charger" placeholder="6.1 Kw" />
          </label>

          <label>Start time
            <input type="datetime-local" name="time_start" />
          </label>
          <label>End time (actual)
            <input type="datetime-local" name="actual_end" />
          </label>

          <label>Cost (₱)
            <input type="number" step="0.01" name="cost_php" />
          </label>
          <label class="full">Notes
            <input type="text" name="notes" placeholder="Optional" />
          </label>
        </div>
        <div class="actions">
          <button type="submit" class="primary">Save Entry</button>
          <button type="button" id="cancel-edit" class="ghost" hidden>Cancel Edit</button>
        </div>
      </form>
    </section>

    <section class="card stats-card">
      <h2>Stats</h2>
      <div id="stats" class="stats-grid"></div>
    </section>

    <section class="card vehicles-card">
      <h2>Vehicles</h2>
      <ul id="vehicle-list"></ul>
      <details>
        <summary>Add / edit vehicle</summary>
        <form id="vehicle-form" class="grid">
          <label>Model
            <input type="text" name="model" required />
          </label>
          <label>Battery (kWh)
            <input type="number" step="0.01" name="battery_kwh" />
          </label>
          <label>Range (km)
            <input type="number" step="0.1" name="range_km" />
          </label>
          <div class="actions">
            <button type="submit" class="primary">Save Vehicle</button>
          </div>
        </form>
      </details>
    </section>

    <section class="card history-card">
      <div class="card-head">
        <h2>History</h2>
        <div class="actions">
          <button id="export-btn" class="ghost">Export JSON</button>
          <label class="ghost file-btn">
            Import JSON
            <input type="file" id="import-input" accept="application/json" hidden />
          </label>
          <button id="load-seed-btn" class="ghost">Load Seed (42)</button>
          <button id="clear-btn" class="danger">Clear All</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="history-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Vehicle</th>
              <th>ODO</th>
              <th>Start→End %</th>
              <th>kWh</th>
              <th>kW</th>
              <th>Duration</th>
              <th>Location</th>
              <th>Cost ₱</th>
              <th>km/kWh</th>
              <th>km since</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
