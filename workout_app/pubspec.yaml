name: workout_app
description: Strength-training log with auto 1RM estimation and MAX RM tracking.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: ^1.9.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  csv: ^6.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
